<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RNA Atlas Explorer — cryo-EM target selection</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>RNA Atlas Explorer</h1>
  <span id="universe" class="universe">curated set</span>
  <span id="count" class="count"></span>
</header>

<div id="layout">
  <aside id="config">
    <h2>Selection arguments</h2>

    <fieldset>
      <legend>Length (nt)</legend>
      <div class="row"><label>min</label><input type="number" id="len_min" value="0" min="0"><span id="len_min_v"></span></div>
      <div class="row"><label>max</label><input type="number" id="len_max" value="9999" min="0"><span id="len_max_v"></span></div>
    </fieldset>

    <fieldset>
      <legend>Confidence</legend>
      <div class="row"><label>pLDDT &ge;</label><input type="range" id="plddt_min" min="0" max="100" value="0" step="1"><span id="plddt_min_v">0</span></div>
      <div class="row"><label>clash &le;</label><input type="number" id="clash_max" value="9999" step="1"></div>
    </fieldset>

    <fieldset>
      <legend>Novelty</legend>
      <div class="row"><label>best_tm1 &le;</label><input type="range" id="tm_max" min="0" max="1" value="1" step="0.01"><span id="tm_max_v">1.00</span></div>
      <label class="chk"><input type="checkbox" id="tm_has"> only folds with computed best_tm1</label>
      <div class="row"><label>overlap_AE &le;</label><input type="range" id="ov_max" min="0" max="1" value="1" step="0.01"><span id="ov_max_v">1.00</span></div>
    </fieldset>

    <fieldset>
      <legend>SHAPE support</legend>
      <label class="chk"><input type="checkbox" id="shape_ok"> require SHAPE-supported</label>
      <div class="row"><label>r(2A3) &le;</label><input type="range" id="r2a3_max" min="-1" max="1" value="1" step="0.01"><span id="r2a3_max_v">1.00</span></div>
    </fieldset>

    <fieldset>
      <legend>Motifs</legend>
      <label class="chk"><input type="checkbox" id="req_tert"> require &ge;1 tertiary motif</label>
      <label class="chk"><input type="checkbox" id="req_rare"> require a rare tertiary motif</label>
      <div id="motif_filter"></div>
    </fieldset>

    <fieldset>
      <legend>Topology / source</legend>
      <select id="pk"><option value="any">pseudoknot: any</option><option value="1">pseudoknot only</option><option value="0">exclude pseudoknots</option></select>
      <div id="letter_filter" class="letters"></div>
    </fieldset>

    <fieldset>
      <legend>Ranking</legend>
      <select id="rank_key">
        <option value="best_tm1:asc">novelty (best_tm1 ascending)</option>
        <option value="overlap_ae:asc">distinct vs A&ndash;E (overlap ascending)</option>
        <option value="score:desc">composite score</option>
        <option value="plddt:desc">pLDDT</option>
        <option value="length:desc">length (large first)</option>
        <option value="n_rare:desc">rare motifs</option>
      </select>
      <div class="row"><label>top-N</label><input type="number" id="topn" value="200" min="1"></div>
      <label class="chk"><input type="checkbox" id="per_letter"> top-N per letter</label>
    </fieldset>

    <button id="reset">Reset</button>
  </aside>

  <main id="results">
    <table id="tbl">
      <thead><tr id="thead"></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </main>
</div>

<div id="deep" class="hidden">
  <div class="deep-card">
    <button id="deep-close">&times;</button>
    <h2 id="deep-title"></h2>
    <div class="deep-body">
      <div id="viewer3d"></div>
      <div id="tracks"></div>
      <div id="props"></div>
    </div>
  </div>
</div>

<script src="lib/3Dmol-min.js"></script>
<script src="viz_style.js"></script>
<script src="app.js"></script>
</body>
</html>
